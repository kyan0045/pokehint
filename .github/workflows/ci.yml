name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  quality:
    name: Formatting and type declarations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck

  package:
    name: Package smoke test
    needs: [test, quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm pack --dry-run
      - name: Install and test packed package
        shell: bash
        run: |
          tarball="$(npm pack --silent --pack-destination "$RUNNER_TEMP")"
          npm install --prefix "$RUNNER_TEMP/pokehint-smoke" "$RUNNER_TEMP/$tarball"
          node -e "const p = require(process.env.RUNNER_TEMP + '/pokehint-smoke/node_modules/pokehint'); if (p.checkRaritySync('Moltres') !== 'Legendary' || !(p.checkRarity('Moltres') instanceof Promise)) process.exit(1)"
